<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
    <style>
        body { font-family: Georgia, serif; background: #1a1210; color: #c9a84c; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 40px; border: 2px solid #c9a84c; border-radius: 12px; }
        button { background: #2a1a0a; color: #c9a84c; border: 1px solid #c9a84c; padding: 10px 24px; font-family: Georgia; font-size: 14px; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        #result { margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>BardBoxFX — CORS Test</h2>
        <p>Testing iframe embed of monochrome.tf</p>
        <div id="result" style="margin-top:16px;"></div>
        <div id="frame-container" style="margin-top:16px; width:100%; display:none;">
            <iframe id="testframe"
                src="https://monochrome.tf/track/371191195"
                width="100%" height="200"
                style="border:1px solid #c9a84c; border-radius:8px; background:#000;"
                allow="autoplay"
            ></iframe>
        </div>
    </div>
    <script>
        const result = document.getElementById('result');
        const frame = document.getElementById('testframe');
        const container = document.getElementById('frame-container');

        container.style.display = 'block';

        frame.onload = () => {
            result.style.color = '#4caf50';
            result.textContent = '✓ iframe loaded — embed may be allowed!';
        };

        frame.onerror = () => {
            result.style.color = '#cc4444';
            result.textContent = '✗ iframe blocked.';
        };

        // Fallback timeout — if no load event fires in 6s, likely blocked
        setTimeout(() => {
            if (!result.textContent || result.textContent === '') {
                result.style.color = '#cc4444';
                result.textContent = '✗ No response after 6s — likely blocked by X-Frame-Options.';
            }
        }, 6000);
    </script>
</body>
</html>
