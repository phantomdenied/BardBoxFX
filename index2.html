<!DOCTYPE html>
<html>
<head>
    <title>iframe Test</title>
    <style>
        body { font-family: Georgia, serif; background: #1a1210; color: #c9a84c; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { text-align: center; padding: 40px; border: 2px solid #c9a84c; border-radius: 12px; max-width: 700px; width: 95%; }
        #result { margin: 16px 0; font-size: 13px; min-height: 20px; }
        iframe { width: 100%; height: 400px; border: 1px solid #c9a84c; border-radius: 8px; background: #000; display: block; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>BardBoxFX — iframe Test</h2>
        <p>Testing: ezconv.cc</p>
        <div id="result">Loading iframe...</div>
        <iframe id="testframe" src="https://ezconv.cc/"></iframe>
    </div>
    <script>
        const frame = document.getElementById('testframe');
        const result = document.getElementById('result');

        frame.onload = () => {
            result.style.color = '#4caf50';
            result.textContent = '✓ iframe loaded!';
        };
        frame.onerror = () => {
            result.style.color = '#cc4444';
            result.textContent = '✗ iframe blocked.';
        };
        setTimeout(() => {
            if (result.textContent === 'Loading iframe...') {
                result.style.color = '#cc4444';
                result.textContent = '✗ No response after 6s — likely blocked by X-Frame-Options.';
            }
        }, 6000);
    </script>
</body>
</html>
